---
configuration:
  model:
    name: Model
    description: >-
      Which ASR model to download and run, from the transcribe.cpp GGUF
      catalog. The language comes from the Home Assistant voice pipeline.
      Changing this downloads the new model on next start.
  quantization:
    name: Model quantization
    description: >-
      GGUF weight precision of the downloaded model. q4_k_m = smallest/fastest
      and lowest RAM (default); f16 = best quality but much larger. If the
      selected model doesn't publish the chosen precision, the nearest larger
      one is used automatically. Changing this re-downloads the model.
  custom_model:
    name: Custom model (HuggingFace repo ID)
    description: >-
      Convert your own fine-tuned checkpoint (e.g. a Whisper fine-tune) to
      GGUF on this device and serve it — overrides the model selection above.
      First conversion installs torch-cpu into /data and is slow; the result
      is cached. Whisper-architecture checkpoints are supported.
  speech_enhancement:
    name: Speech enhancement
    description: >-
      Denoise each utterance with GTCRN before transcription. Helps in noisy
      rooms; adds a little latency and disables live partial transcripts.
  diarization:
    name: Speaker diarization
    description: >-
      Tag the transcript with [Speaker N] labels for multi-speaker audio.
      For Assist voice commands, chaining the Voiceprint add-on in front
      gives named speakers instead. Disables live partial transcripts.
  max_speakers:
    name: Max speakers
    description: >-
      Optional diarization hint — the number of distinct speakers to expect.
      Leave unset for automatic clustering.
  hf_token:
    name: HuggingFace token
    description: >-
      Optional access token for gated/private model repos and to lift anonymous
      download rate limits. Leave empty for public models.
  debug_logging:
    name: Debug logging
    description: Enable verbose logging for troubleshooting.
